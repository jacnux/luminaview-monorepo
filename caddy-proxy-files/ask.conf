server {
    listen 80;
    server_name localhost;

    location /ask {
        # Check if the domain ends with .helioscope.fr
        if ($arg_domain ~ "\.helioscope\.fr$") {
            return 200;
        }
        # Also allow the bare domain
        if ($arg_domain = "helioscope.fr") {
            return 200;
        }
        
        return 403;
    }
}
