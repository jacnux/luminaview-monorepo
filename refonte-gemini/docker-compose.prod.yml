# Stack Docker Compose pour la Production (avec Caddy Reverse Proxy & SSL Auto)

services:
  caddy:
    image: caddy:2-alpine
    container_name: luminaview-gemini-caddy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - gemini-network
    depends_on:
      - manager
      - portfolio
      - blog
      - chambrenoire

  mongo:
    image: mongo:4.4
    container_name: luminaview-gemini-mongo
    restart: always
    volumes:
      - ./data/mongo:/data/db
    networks:
      - gemini-network

  backend:
    build: ./backend
    container_name: luminaview-gemini-backend
    restart: always
    volumes:
      - ./data/uploads:/app/uploads
    depends_on:
      - mongo
    environment:
      - MONGO_URI=mongodb://mongo:27017/luminaview_core
      - JWT_SECRET=changeThisSecretLuminaView123!
      - PORT=3000
      - FRONTEND_URL=https://lumina.fr
    networks:
      - gemini-network

  manager:
    build: ./apps/manager
    container_name: luminaview-gemini-manager
    restart: always
    depends_on:
      - backend
    networks:
      - gemini-network

  blog:
    build: ./apps/blog
    container_name: luminaview-gemini-blog
    restart: always
    depends_on:
      - backend
    networks:
      - gemini-network

  portfolio:
    build: ./apps/portfolio
    container_name: luminaview-gemini-portfolio
    restart: always
    depends_on:
      - backend
    networks:
      - gemini-network

  chambrenoire:
    build: ./apps/chambrenoire
    container_name: luminaview-gemini-chambrenoire
    restart: always
    depends_on:
      - backend
    networks:
      - gemini-network

volumes:
  caddy_data:
  caddy_config:

networks:
  gemini-network:
    driver: bridge
