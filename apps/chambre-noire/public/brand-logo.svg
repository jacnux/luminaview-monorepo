<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#2b2b2b"/>
      <stop offset="100%" stop-color="#0d0d0d"/>
    </radialGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3a3a3a"/>
      <stop offset="100%" stop-color="#111"/>
    </linearGradient>
  </defs>

  <!-- Fond rond -->
  <circle cx="200" cy="200" r="190" fill="url(#bg)" stroke="#444" stroke-width="2"/>

  <!-- Diaphragme / ouverture d'objectif -->
  <g transform="translate(200,190)">
    <circle r="120" fill="none" stroke="url(#ring)" stroke-width="14"/>
    <g fill="#1a1a1a" stroke="#e8b04b" stroke-width="3">
      <!-- 8 lamelles du diaphragme -->
      <path d="M0,-110 L95,-55 L55,-95 Z"/>
      <path d="M110,0 L55,95 L95,55 Z" transform="rotate(45)"/>
      <path d="M0,-110 L95,-55 L55,-95 Z" transform="rotate(90)"/>
      <path d="M0,-110 L95,-55 L55,-95 Z" transform="rotate(135)"/>
      <path d="M0,-110 L95,-55 L55,-95 Z" transform="rotate(180)"/>
      <path d="M0,-110 L95,-55 L55,-95 Z" transform="rotate(225)"/>
      <path d="M0,-110 L95,-55 L55,-95 Z" transform="rotate(270)"/>
      <path d="M0,-110 L95,-55 L55,-95 Z" transform="rotate(315)"/>
    </g>
    <!-- Pupille centrale -->
    <circle r="34" fill="#e8b04b"/>
    <circle r="34" fill="none" stroke="#0d0d0d" stroke-width="4"/>
  </g>

  <!-- Texte -->
  <text x="200" y="345" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="34" letter-spacing="4" fill="#e8b04b">CHAMBRE NOIRE</text>
</svg>
