<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8b04b"/>
      <stop offset="100%" stop-color="#b8862f"/>
    </linearGradient>
  </defs>

  <!-- Diaphragme / ouverture d'objectif (sans fond, sans texte) -->
  <g transform="translate(200,200)">
    <circle r="120" fill="none" stroke="url(#ring)" stroke-width="14"/>
    <g fill="none" stroke="#e8b04b" stroke-width="3">
      <!-- 8 lamelles du diaphragme (contour doré seul) -->
      <path d="M0,-110 L95,-55 L55,-95 Z"/>
      <path d="M110,0 L55,95 L95,55 Z" transform="rotate(45)"/>
      <path d="M0,-110 L95,-55 L55,-95 Z" transform="rotate(90)"/>
      <path d="M0,-110 L95,-55 L55,-95 Z" transform="rotate(135)"/>
      <path d="M0,-110 L95,-55 L55,-95 Z" transform="rotate(180)"/>
      <path d="M0,-110 L95,-55 L55,-95 Z" transform="rotate(225)"/>
      <path d="M0,-110 L95,-55 L55,-95 Z" transform="rotate(270)"/>
      <path d="M0,-110 L95,-55 L55,-95 Z" transform="rotate(315)"/>
    </g>
    <!-- Pupille centrale -->
    <circle r="34" fill="#e8b04b"/>
    <circle r="34" fill="none" stroke="#1a1a1a" stroke-width="3"/>
  </g>
</svg>
