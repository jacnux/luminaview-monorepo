#version: '3.8'

services:
  mongo:
    image: mongo:4.4
    container_name: luminaview-gemini-mongo
    volumes:
      - ./data/mongo:/data/db
    networks:
      - gemini-network

  backend:
    build: ./backend
    container_name: luminaview-gemini-backend
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
      - ./data/uploads:/app/uploads
    depends_on:
      - mongo
    environment:
      - MONGO_URI=mongodb://mongo:27017/luminaview_core
      - JWT_SECRET=changeThisSecretLuminaView123!
      - PORT=3000
    networks:
      - gemini-network

  manager:
    build: ./apps/manager
    container_name: luminaview-gemini-manager
    ports:
      - "9080:80"
    depends_on:
      - backend
    networks:
      - gemini-network

  blog:
    build: ./apps/blog
    container_name: luminaview-gemini-blog
    ports:
      - "9081:80"
    depends_on:
      - backend
    networks:
      - gemini-network

  portfolio:
    build: ./apps/portfolio
    container_name: luminaview-gemini-portfolio
    ports:
      - "9090:80"
    depends_on:
      - backend
    networks:
      - gemini-network

  chambrenoire:
    build: ./apps/chambrenoire
    container_name: luminaview-gemini-chambrenoire
    ports:
      - "9082:80"
    depends_on:
      - backend
    networks:
      - gemini-network

networks:
  gemini-network:
    driver: bridge
