# Stack Docker Compose pour la Production (avec Caddy Reverse Proxy & SSL Auto)

services:
  caddy:
    image: caddy:2-alpine
    container_name: luminaview-caddy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    env_file:
      - .env
    environment:
      - LETSENCRYPT_EMAIL=${LETSENCRYPT_EMAIL:-admin@lumina.fr}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - luminaview-network
    depends_on:
      - manager
      - portfolio
      - blog
      - chambrenoire

  mongo:
    image: mongo:4.4
    container_name: luminaview-mongo
    restart: always
    volumes:
      - ./data/mongo:/data/db
    networks:
      - luminaview-network

  backend:
    build: ./backend
    container_name: luminaview-backend
    restart: always
    env_file:
      - .env
    volumes:
      - ./data/uploads:/app/uploads
    depends_on:
      - mongo
    environment:
      - MONGO_URI=${MONGO_URI:-mongodb://mongo:27017/luminaview_core}
      - JWT_SECRET=${JWT_SECRET}
      - SESSION_SECRET=${SESSION_SECRET}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_SECURE=${SMTP_SECURE}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM=${SMTP_FROM}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - PORT=3000
      - FRONTEND_URL=https://lumina.fr
    networks:
      - luminaview-network

  manager:
    build: ./apps/manager
    container_name: luminaview-manager
    restart: always
    depends_on:
      - backend
    networks:
      - luminaview-network

  blog:
    build: ./apps/blog
    container_name: luminaview-blog
    restart: always
    depends_on:
      - backend
    networks:
      - luminaview-network

  portfolio:
    build: ./apps/portfolio
    container_name: luminaview-portfolio
    restart: always
    depends_on:
      - backend
    networks:
      - luminaview-network

  chambrenoire:
    build: ./apps/chambrenoire
    container_name: luminaview-chambrenoire
    restart: always
    depends_on:
      - backend
    networks:
      - luminaview-network

volumes:
  caddy_data:
  caddy_config:

networks:
  luminaview-network:
    driver: bridge
