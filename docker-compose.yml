# Stack Docker Compose pour le Développement Local

services:
  mongo:
    image: mongo:4.4
    container_name: luminaview-mongo
    volumes:
      - ./data/mongo:/data/db
    networks:
      - luminaview-local-network

  backend:
    build: ./backend
    container_name: luminaview-backend
    ports:
      - "7099:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
      - ./data/uploads:/app/uploads
    depends_on:
      - mongo
    environment:
      - MONGO_URI=mongodb://mongo:27017/luminaview_core
      - JWT_SECRET=changeThisSecretLuminaView123!
      - PORT=3000
      - SMTP_HOST=mailhog
      - SMTP_PORT=1025
      - SMTP_FROM=test@helioscope.fr
    networks:
      - luminaview-local-network

  manager:
    build: ./apps/manager
    container_name: luminaview-manager
    ports:
      - "7080:80"
    depends_on:
      - backend
    networks:
      - luminaview-local-network

  blog:
    build: ./apps/blog
    container_name: luminaview-blog
    ports:
      - "7081:80"
    depends_on:
      - backend
    networks:
      - luminaview-local-network

  portfolio:
    build: ./apps/portfolio
    container_name: luminaview-portfolio
    ports:
      - "7090:80"
    depends_on:
      - backend
    networks:
      - luminaview-local-network
  chambrenoire:
    build: ./apps/chambrenoire
    container_name: luminaview-chambrenoire
    ports:
      - "7082:80"
    depends_on:
      - backend
    networks:
      - luminaview-local-network

  # --- MAILHOG ---
  mailhog:
    image: mailhog/mailhog
    container_name: luminaview-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - luminaview-local-network

networks:
  luminaview-local-network:
    driver: bridge
