services:
  caddy:
    image: caddy:2-alpine
    container_name: caddy-proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - webproxy
    depends_on:
      - caddy-ask

  caddy-ask:
    image: nginx:alpine
    container_name: caddy-ask
    restart: always
    volumes:
      - ./ask.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - webproxy

volumes:
  caddy_data:
  caddy_config:

networks:
  webproxy:
    external: true
